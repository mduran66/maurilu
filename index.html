<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🔒</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:system-ui;}
.stage{height:100vh;display:flex;flex-direction:column}
.scene{display:none;height:100%}
.scene.active{display:flex;flex-direction:column;justify-content:center;align-items:center}

.videoWrap{
  width:90vw;
  max-width:420px;
  aspect-ratio:9/16;
  border-radius:16px;
  overflow:hidden;
  background:#000;
}

.videoWrap iframe{
  width:100%;
  height:100%;
  border:0;
}

button{
  margin-top:20px;
  padding:12px 16px;
  border-radius:10px;
  border:none;
  background:#7aa2ff;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="stage">

  <!-- SCENE 1 -->
  <div class="scene active" id="scene1">
    <h2>Continuar</h2>
    <button onclick="goToVideo()">Ir al video</button>
  </div>

  <!-- SCENE VIDEO -->
  <div class="scene" id="sceneVideo">
    <div class="videoWrap" id="videoWrap">
      <div style="display:flex;align-items:center;justify-content:center;height:100%">
        Cargando video...
      </div>
    </div>

    <button onclick="back()">Volver</button>
  </div>

</div>

<script>
const videoId = "1175649210";
const videoWrap = document.getElementById("videoWrap");

function mountVideo(){
  if(videoWrap.querySelector("iframe")) return;

  videoWrap.innerHTML = `
    <iframe
      src="https://player.vimeo.com/video/${videoId}?autoplay=1&muted=1&loop=1&background=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  `;
}

function unmountVideo(){
  videoWrap.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100%">
      Cargando video...
    </div>
  `;
}

function goToVideo(){
  document.getElementById("scene1").classList.remove("active");
  document.getElementById("sceneVideo").classList.add("active");
  mountVideo();
}

function back(){
  document.getElementById("sceneVideo").classList.remove("active");
  document.getElementById("scene1").classList.add("active");
  unmountVideo();
}
</script>

</body>
</html>
